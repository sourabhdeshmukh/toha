name: Sync Upstream to Fork

on:
  schedule:
    # Runs every day at midnight UTC (Adjust as needed)
    - cron: '0 0 * * *'
  workflow_dispatch: # Allows you to trigger this manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out your forked repository
      - name: Checkout Fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetch all history so we can merge properly

      # Step 2: Set up Git identity
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # Step 3: Add the upstream repository and fetch its changes
      - name: Fetch Upstream
        run: |
          # CHANGE THESE VARIABLES TO MATCH YOUR REPOS
          UPSTREAM_REPO="https://github.com/hugo-themes/toha.git"
          UPSTREAM_BRANCH="main" 
          FORK_BRANCH="main"
          SYNC_BRANCH="sync-upstream-changes"

          echo "Adding upstream remote..."
          git remote add upstream "$UPSTREAM_REPO"
          git fetch upstream "$UPSTREAM_BRANCH"

          # Check if there are actually any new changes to sync
          if git diff --quiet "HEAD..upstream/$UPSTREAM_BRANCH"; then
            echo "No new changes found. Exiting smoothly."
            echo "HAS_CHANGES=false" >> $GITHUB_ENV
            exit 0
          fi

          echo "HAS_CHANGES=true" >> $GITHUB_ENV
          
          # Create a new branch for the PR based on upstream changes
          git checkout -b "$SYNC_BRANCH"
          git merge "upstream/$UPSTREAM_BRANCH" --allow-unrelated-histories -m "Merge upstream changes"
          
          # Push the sync branch to your fork
          git push origin "$SYNC_BRANCH" --force
          
          # Pass variables to the next step
          echo "UPSTREAM_BRANCH=$UPSTREAM_BRANCH" >> $GITHUB_ENV
          echo "FORK_BRANCH=$FORK_BRANCH" >> $GITHUB_ENV
          echo "SYNC_BRANCH=$SYNC_BRANCH" >> $GITHUB_ENV

      # Step 4: Create the Pull Request if changes exist
      - name: Create Pull Request
        if: env.HAS_CHANGES == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Check if a PR already exists for this branch to avoid duplicates
          PR_EXISTS=$(gh pr list --head "$SYNC_BRANCH" --base "$FORK_BRANCH" --json number --jq '.[0].number')
          
          if [ -z "$PR_EXISTS" ]; then
            echo "Creating a new Pull Request..."
            gh pr create \
              --title "🔄 Sync upstream changes" \
              --body "This is an automated PR to sync the latest changes from the upstream repository." \
              --base "$FORK_BRANCH" \
              --head "$SYNC_BRANCH"
          else
            echo "Pull Request already exists (#$PR_EXISTS). Skipping creation."
          fi